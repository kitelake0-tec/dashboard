<!DOCTYPE html>
  <html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>키워드·감성 분석 대시보드</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0f172a;
        color: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
        padding: 20px;
      }
      .emoji { font-size: 64px; margin-bottom: 20px; }
      h1 { font-size: 24px; margin-bottom: 8px; }
      .warning {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 10px;
        padding: 14px 20px;
        font-size: 13px;
        color: #94a3b8;
        margin-bottom: 28px;
        max-width: 320px;
        line-height: 1.6;
      }
      .warning strong { color: #fbbf24; }
      .btn {
        display: inline-block;
        background: #dc2626;
        color: white;
        padding: 14px 32px;
        border-radius: 12px;
        text-decoration: none;
        font-size: 16px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="emoji">📊</div>
    <h1>키워드·감성 분석 대시보드</h1>
    <div class="warning">
      <strong>⚠️ PC Chrome 브라우저에서 열어주세요</strong><br>
    </div>
    <a class="btn" href="https://script.google.com/macros/s/AKfycbwBfS7H6i7v5eyqehur0dBgKUaZZJXfwGbvGhRymoAFukVHH2l1LvgvFi8P8Wnd0h65-A/exec">
      입장하기
    </a>
  </body>
  </html>
